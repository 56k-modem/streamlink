server {
    listen 80 default_server;
    server_name _;

    etag off;
    if_modified_since off;

    # Folder inside the container (mapped from ./files on the host)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;

        # Prevent client-side caching
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;   # HTTP/1.0 fallback
        add_header Expires 0 always;
    }

    # Show directory listing & make files downloadable
    autoindex on;
    autoindex_exact_size off;   # show human-readable sizes (KB/MB)
    autoindex_localtime on;     # timestamps in your local time
}
