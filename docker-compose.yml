x-streamlink-build: &streamlink-build
  context: .
  dockerfile: Dockerfile

services:
  streamlink-twitch:
    image: ghcr.io/56k-modem/streamlink:latest
    build: *streamlink-build
    container_name: streamlink-twitch
    command: ["/bin/bash","./streamlinkcmd-twitch.sh"]
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '/usr/local/bin/python3.14 /usr/local/bin/streamlink' | grep -v grep > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - TZ=Europe/Budapest
      - TWITCH_OAUTH
      - HC_UUID
      - HC_LOCAL_PING_URL
    volumes:
      - ${VOD_DIR}:/wubby
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  streamlink-kick:
    image: ghcr.io/56k-modem/streamlink:latest
    build: *streamlink-build
    container_name: streamlink-kick
    command: ["/bin/bash","./streamlinkcmd-kick.sh"]
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '/usr/local/bin/python3.14 /usr/local/bin/streamlink' | grep -v grep > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - TZ=Europe/Budapest
      - HC_UUID
      - HC_LOCAL_PING_URL
    volumes:
      - ${VOD_DIR}:/wubby
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  streamlink-test:
    profiles: ["testing"]
    image: ghcr.io/56k-modem/streamlink:latest
    build: *streamlink-build
    container_name: streamlink-test
    command: ["/bin/bash","./streamlinkcmd-test.sh"]
    stdin_open: true
    tty: true
    environment:
      - TZ=Europe/Budapest
      - TWITCH_OAUTH
    volumes:
      - ${TEST_DIR}:/test
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  contact-sheets:
    image: ghcr.io/56k-modem/contact-sheets:latest
    build:
      context: ./caddy
      dockerfile: Dockerfile
    container_name: contact-sheets
    ports:
      - "8084:80"
    volumes:
      - ${CONTACT_SHEETS_DIR}:/srv:ro
    environment:
      - TZ=Europe/Budapest
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  vcsi:
    image: ghcr.io/56k-modem/vcsi:latest
    build:
      context: ./vcsi
      dockerfile: Dockerfile
    container_name: vcsi
    command: ["--stay-alive"]
    environment:
      - TZ=Europe/Budapest
    user: "1000:1000"
    volumes:
      - ${VOD_DIR}:/input
      - ${CONTACT_SHEETS_DIR}:/output
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  vcsi-trigger:
    image: ghcr.io/56k-modem/postproc-trigger:latest
    build:
      context: ./postproc-trigger
      dockerfile: Dockerfile
    container_name: vcsi-trigger
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Europe/Budapest
      - VOD_DIR
      - CONTACT_SHEETS_DIR
