services:
  streamlink-twitch:
    image: ghcr.io/56k-modem/streamlink:latest
    container_name: streamlink-twitch
    command: ["/bin/bash","./streamlinkcmd-twitch.sh"]
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '/usr/local/bin/python3.12 /usr/local/bin/streamlink' | grep -v grep > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - TZ=Europe/Budapest
      - TWITCH_OAUTH
      - HC_UUID
      - HC_LOCAL_PING_URL
    volumes:
      - ${VOD_DIR}:/wubby
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  streamlink-kick:
    image: ghcr.io/56k-modem/streamlink:latest
    container_name: streamlink-kick
    command: ["/bin/bash","./streamlinkcmd-kick.sh"]
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '/usr/local/bin/python3.12 /usr/local/bin/streamlink' | grep -v grep > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - TZ=Europe/Budapest
      - HC_UUID
      - HC_LOCAL_PING_URL
    volumes:
      - ${VOD_DIR}:/wubby
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  streamlink-test:
    image: ghcr.io/56k-modem/streamlink:latest
    container_name: streamlink-test
    command: ["/bin/bash","./streamlinkcmd-test.sh"]
    stdin_open: true
    tty: true
    environment:
      - TZ=Europe/Budapest
      - TWITCH_OAUTH
    volumes:
      - ${TEST_DIR}:/test
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  ntfy-test:
    image: ghcr.io/56k-modem/streamlink:latest
    container_name: ntfy-test
    command: ["/bin/bash","./streamlinkcmd-ntfy-test.sh"]
    stdin_open: true
    tty: true
    environment:
      - TZ=Europe/Budapest
      - NTFY_TOKEN
      - NTFY_URL
      - NTFY_CLICK_URL
    volumes:
      - ${VOD_DIR}:/wubby
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
