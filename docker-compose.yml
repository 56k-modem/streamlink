  contact-sheets:
    image: caddy:alpine
    container_name: contact-sheets
    ports:
      - "8084:80"
    volumes:
      - ${CONTACT_SHEETS_DIR}:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    environment:
      - TZ=Europe/Budapest
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  vcsi:
    image: ghcr.io/56k-modem/vcsi:latest
    container_name: vcsi
    environment:
      - TZ=Europe/Budapest
    user: "1000:1000"
    volumes:
      - ${VOD_DIR}:/input
      - ${CONTACT_SHEETS_DIR}:/output
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
  vcsi-trigger:
    image: docker:cli
    container_name: vcsi-trigger
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./watch-postproc.sh:/watch-postproc.sh:ro
    environment:
      - TZ=Europe/Budapest
      - VOD_DIR
      - CONTACT_SHEETS_DIR
    entrypoint: ["/bin/sh", "/watch-postproc.sh"]
